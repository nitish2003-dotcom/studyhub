<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StudyHub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-left">
            <div class="auth-brand">StudyHub</div>
            <h1>Welcome Back</h1>
            <p>
                Login to continue your study session, track progress, manage tasks,
                and access your AI-powered dashboard.
            </p>

            <div class="auth-feature-box">
                <div class="auth-feature">
                    <i class="fa-solid fa-book-open"></i>
                    <span>Smart Study Room</span>
                </div>
                <div class="auth-feature">
                    <i class="fa-solid fa-chart-simple"></i>
                    <span>Progress Tracking</span>
                </div>
                <div class="auth-feature">
                    <i class="fa-solid fa-clock"></i>
                    <span>Pomodoro Timer</span>
                </div>
            </div>
        </div>

        <div class="auth-right">
            <form class="auth-form glass-card" method="POST">
                <h2>Login</h2>
                <p class="auth-subtext">Enter your details to access your account</p>

                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="auth-btn">Login</button>

                <p class="switch-text">
                    Don’t have an account?
                    <a href="/signup">Create one</a>
                </p>
            </form>
        </div>
    </div>
</body>
</html>
